[build]
  command = "npm install"
  functions = "functions"
  publish = "src"

[functions]
  included_files = ["views/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
